<!-- ── Global gene tooltip ────────────────────────────────────────────── -->
<div id="gene-tip" role="tooltip" aria-hidden="true">
  <div id="gene-tip-header"><span id="gene-tip-badge"></span><span id="gene-tip-name"></span></div>
  <div id="gene-tip-body"></div>
</div>
<style>
#gene-tip{display:none;position:fixed;z-index:9999;width:340px;border-radius:var(--radius,6px);background:var(--bg-card,#fff);border:1px solid var(--border,#dde);border-left:4px solid #2563eb;box-shadow:0 4px 18px rgba(0,0,0,.13);overflow:hidden;font-family:inherit;pointer-events:none}
#gene-tip-header{display:flex;align-items:center;gap:7px;padding:8px 11px 7px;border-bottom:1px solid var(--border,#dde);background:var(--bg-elevated,#f6f7fb)}
#gene-tip-badge{font-size:10px;font-weight:700;letter-spacing:.05px;padding:1px 5px;border-radius:3px;flex-shrink:0;background:#e8f0ff;color:#3a4ab0}
#gene-tip-name{font-size:12px;font-weight:700;color:var(--text,#111);letter-spacing:.1px}
#gene-tip-body{padding:8px 11px 9px;font-size:12px;color:var(--text-muted,#555);line-height:1.55}
#gene-tip-body .gene-tip-full{font-style:italic;margin-bottom:5px;color:var(--text,#333)}
#gene-tip-body .gene-tip-row{display:flex;gap:5px;align-items:baseline;margin-bottom:2px}
#gene-tip-body .gene-tip-label{font-size:11px;color:var(--text-muted,#888);flex-shrink:0;min-width:70px}
#gene-tip-body .gene-tip-val{color:var(--text,#333)}
#gene-tip-body .gene-tip-desc{margin-top:6px;padding-top:6px;border-top:1px solid var(--border,#eee);font-size:11px;color:var(--text-muted,#666);line-height:1.5}
</style>
<script>
(function(){
  const tip  = document.getElementById('gene-tip');
  const tipN  = document.getElementById('gene-tip-name');
  const tipBa = document.getElementById('gene-tip-badge');
  const tipB  = document.getElementById('gene-tip-body');
  const cache = {};
  let hideTimer = null, currentEl = null;

  function resolveTarget(target) {
    const a = target.closest('a[href]');
    if (!a) return null;
    const m = a.getAttribute('href').match(/\/perturbseq\/gene\/([^/?#]+)/);
    if (!m) return null;
    return { el: a, gene: decodeURIComponent(m[1]) };
  }

  function positionNear(el) {
    const pad = 8, W = window.innerWidth, H = window.innerHeight;
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = r.left, y = r.bottom + 6;
    if (y + th > H - pad) y = r.top - th - 6;
    if (x + tw > W - pad) x = r.right - tw;
    tip.style.left = Math.max(pad, x) + 'px';
    tip.style.top  = Math.max(pad, y) + 'px';
  }

  function render(gene, data, el) {
    tipN.textContent = gene;
    if (data.is_tf) {
      tipBa.textContent = 'TF';
      tipBa.style.display = '';
      tip.style.borderLeftColor = '#3a4ab0';
    } else {
      tipBa.style.display = 'none';
      tip.style.borderLeftColor = '#2563eb';
    }

    const modColor = (window.MODULE_COLORS && window.MODULE_COLORS[data.supermodule]) || '#9098b8';
    const modPill = (name, opacity) =>
      `<span style="display:inline-block;padding:1px 6px;border-radius:3px;background:${modColor};color:#fff;font-family:'SF Mono','Fira Code',monospace;font-size:10px;font-weight:500;opacity:${opacity}">${name}</span>`;

    let html = '';
    if (data.full_name) {
      html += `<div class="gene-tip-full">${data.full_name}</div>`;
    }
    if (data.supermodule) {
      html += `<div class="gene-tip-row"><span class="gene-tip-label">Supermodule</span><span class="gene-tip-val">${modPill(data.supermodule, 0.8)}</span></div>`;
    }
    if (data.submodule) {
      html += `<div class="gene-tip-row"><span class="gene-tip-label">Submodule</span><span class="gene-tip-val">${modPill(data.submodule, 1)}</span></div>`;
    }
    if (data.summary) {
      const truncated = data.summary.length > 300 ? data.summary.slice(0, 300).trimEnd() + '…' : data.summary;
      html += `<div class="gene-tip-desc">${truncated}</div>`;
    }
    if (!html) html = '<span style="color:var(--text-muted,#aaa)">No additional info</span>';
    tipB.innerHTML = html;
    tip.style.display = 'block';
    positionNear(el);
  }

  function scheduleHide() {
    hideTimer = setTimeout(() => { tip.style.display = 'none'; }, 150);
  }

  function show(el, gene) {
    clearTimeout(hideTimer);
    if (!gene) return;
    if (cache[gene] !== undefined) { render(gene, cache[gene], el); return; }
    render(gene, {full_name: null, summary: null, submodule: null, supermodule: null, is_tf: false}, el);
    fetch('/tf-perturbseq/api/gene/' + encodeURIComponent(gene) + '/tooltip')
      .then(r => r.json())
      .then(data => { cache[gene] = data; if (currentEl === el) render(gene, data, el); })
      .catch(() => { cache[gene] = {full_name: null, summary: null, submodule: null, supermodule: null, is_tf: false}; });
  }

  document.addEventListener('mouseover', e => {
    if (window._tooltipLocked) return;
    const r = resolveTarget(e.target);
    if (!r) return;
    currentEl = r.el;
    show(r.el, r.gene);
  });
  document.addEventListener('mouseout', e => {
    const r = resolveTarget(e.target);
    if (r) { currentEl = null; scheduleHide(); }
  });

  // Public API — lets other components fetch gene info using this cache
  window._getGeneTip = function(gene, cb) {
    if (cache[gene] !== undefined) { cb(cache[gene]); return; }
    fetch('/tf-perturbseq/api/gene/' + encodeURIComponent(gene) + '/tooltip')
      .then(r => r.json())
      .then(data => { cache[gene] = data; cb(data); })
      .catch(() => { const empty = {full_name:null,summary:null,submodule:null,supermodule:null,is_tf:false}; cache[gene]=empty; cb(empty); });
  };
})();
</script>

<!-- ── Global module tooltip ───────────────────────────────────────────── -->
<div id="mod-tip" role="tooltip" aria-hidden="true">
  <div id="mod-tip-header"><span id="mod-tip-swatch"></span><span id="mod-tip-name"></span></div>
  <div id="mod-tip-body"></div>
</div>
<style>
#mod-tip{display:none;position:fixed;z-index:9999;width:360px;border-radius:var(--radius,6px);background:var(--bg-card,#fff);border:1px solid var(--border,#dde);border-left:4px solid #4a56b0;box-shadow:0 4px 18px rgba(0,0,0,.13);overflow:hidden;font-family:inherit;pointer-events:none}
#mod-tip-header{display:flex;align-items:center;gap:7px;padding:8px 11px 7px;border-bottom:1px solid var(--border,#dde);background:var(--bg-elevated,#f6f7fb)}
#mod-tip-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
#mod-tip-name{font-size:12px;font-weight:700;color:var(--text,#111);letter-spacing:.1px}
#mod-tip-body{padding:8px 11px 9px;font-size:12px;color:var(--text-muted,#555);line-height:1.55}
</style>
<script>
(function(){
  const tip  = document.getElementById('mod-tip');
  const tipSw = document.getElementById('mod-tip-swatch');
  const tipN  = document.getElementById('mod-tip-name');
  const tipB  = document.getElementById('mod-tip-body');
  const cache = {};
  let hideTimer = null, currentEl = null;

  function getColor(el, mod) {
    return el.dataset.modColor
      || (window.MODULE_COLORS && window.MODULE_COLORS[mod])
      || '#4a56b0';
  }

  function resolveTarget(target) {
    const explicit = target.closest('[data-mod-tip]');
    if (explicit) return { el: explicit, mod: explicit.dataset.modTip };
    const a = target.closest('a[href]');
    if (!a) return null;
    const m = a.getAttribute('href').match(/\/perturbseq\/(?:module|submodule)\/([^/?#]+)/);
    if (!m) return null;
    return { el: a, mod: decodeURIComponent(m[1]) };
  }

  function positionNear(el) {
    const pad = 8, W = window.innerWidth, H = window.innerHeight;
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = r.left, y = r.bottom + 6;
    if (y + th > H - pad) y = r.top - th - 6;
    if (x + tw > W - pad) x = r.right - tw;
    tip.style.left = Math.max(pad, x) + 'px';
    tip.style.top  = Math.max(pad, y) + 'px';
  }

  function gcSparkline(expr, color) {
    const W = 314, PAD_L = 4, PAD_R = 4, PAD_T = 6, PAD_B = 18;
    const IW = W - PAD_L - PAD_R, IH = 44, H = PAD_T + IH + PAD_B;
    const zVals = expr.map(d => d.mean_z);
    const zMin = Math.min(...zVals), zMax = Math.max(...zVals);
    const zRange = zMax - zMin || 1;
    const n = expr.length;
    const xs = expr.map((_, i) => PAD_L + (i / (n - 1)) * IW);
    const toY = z => PAD_T + IH - ((z - zMin) / zRange) * IH;
    const semHi = expr.map((d, i) => `${xs[i]},${toY(d.mean_z + d.sem_z)}`);
    const semLo = [...expr].reverse().map((d, i) => `${xs[n-1-i]},${toY(d.mean_z - d.sem_z)}`);
    const band  = [...semHi, ...semLo].join(' ');
    const line  = xs.map((x, i) => `${x},${toY(zVals[i])}`).join(' ');
    const y0    = toY(0);
    const zeroL = y0 >= PAD_T && y0 <= PAD_T + IH
      ? `<line x1="${PAD_L}" y1="${y0}" x2="${PAD_L+IW}" y2="${y0}" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,2"/>`
      : '';
    const lbls  = ['ES','12h','24h','36h','48h','60h','72h'];
    const ticks = xs.map((x, i) =>
      `<line x1="${x}" y1="${PAD_T+IH+2}" x2="${x}" y2="${PAD_T+IH+5}" stroke="#bbb" stroke-width="1"/>` +
      `<text x="${x}" y="${H-2}" text-anchor="middle" font-size="8" fill="#aaa">${lbls[i]}</text>`
    ).join('');
    return `<svg width="${W}" height="${H}" style="display:block;overflow:visible">
      ${zeroL}
      <polygon points="${band}" fill="${color}" opacity="0.18"/>
      <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${ticks}
    </svg>`;
  }

  function render(mod, data, el) {
    const c = getColor(el, mod);
    tipSw.style.background = c;
    tip.style.borderLeftColor = c;
    tipN.textContent = data.title ? mod + ' — ' + data.title : mod;
    if (data.expr && data.expr.length) {
      const color = data.color || c;
      let html = '';
      if (data.desc) {
        const t = data.desc.length > 130 ? data.desc.slice(0, 130).trimEnd() + '…' : data.desc;
        html += `<div style="font-size:11px;color:var(--text-muted);margin-bottom:7px;line-height:1.45">${t}</div>`;
      }
      html += `<div style="margin-top:2px">${gcSparkline(data.expr, color)}</div>`;
      tipB.innerHTML = html;
    } else {
      tipB.innerHTML = data.desc ? '<div>' + data.desc + '</div>' : '';
    }
    tip.style.display = 'block';
    positionNear(el);
  }

  function scheduleHide() {
    hideTimer = setTimeout(() => { tip.style.display = 'none'; }, 150);
  }

  function show(el, mod) {
    clearTimeout(hideTimer);
    if (!mod) return;
    if (cache[mod] !== undefined) { render(mod, cache[mod], el); return; }
    render(mod, {title: null, desc: null}, el);
    fetch('/tf-perturbseq/api/module/' + encodeURIComponent(mod) + '/tooltip')
      .then(r => r.json())
      .then(data => { cache[mod] = data; if (currentEl === el) render(mod, data, el); })
      .catch(() => { cache[mod] = {title: null, desc: null}; });
  }

  document.addEventListener('mouseover', e => {
    if (window._tooltipLocked) return;
    const r = resolveTarget(e.target);
    if (!r) return;
    currentEl = r.el;
    show(r.el, r.mod);
  });
  document.addEventListener('mouseout', e => {
    const r = resolveTarget(e.target);
    if (r) { currentEl = null; scheduleHide(); }
  });
})();
</script>

<!-- ── Global TF→gene link tooltip ─────────────────────────────────────── -->
<div id="link-tip" role="tooltip" aria-hidden="true">
  <div id="link-tip-header">
    <span id="link-tip-tf"></span>
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;color:var(--text-muted,#999)"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="link-tip-gene"></span>
  </div>
  <div id="link-tip-body"></div>
</div>
<style>
#link-tip{display:none;position:fixed;z-index:9999;width:340px;border-radius:var(--radius,6px);background:var(--bg-card,#fff);border:1px solid var(--border,#dde);border-left:4px solid #6366f1;box-shadow:0 4px 18px rgba(0,0,0,.13);overflow:hidden;font-family:inherit;pointer-events:none}
#link-tip-header{display:flex;align-items:center;gap:5px;padding:7px 11px 6px;border-bottom:1px solid var(--border,#dde);background:var(--bg-elevated,#f6f7fb)}
#link-tip-tf{font-size:12px;font-weight:700;color:#4a56b0}
#link-tip-gene{font-size:12px;font-weight:700;color:#059669}
#link-tip-body{padding:7px 11px 9px}
.lt-chart-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted,#888);margin-bottom:2px}
</style>
<script>
(function(){
  const tip    = document.getElementById('link-tip');
  const tipTf  = document.getElementById('link-tip-tf');
  const tipGene= document.getElementById('link-tip-gene');
  const tipB   = document.getElementById('link-tip-body');
  const cache  = {};
  let hideTimer = null, currentEl = null;

  function resolveTarget(target) {
    const a = target.closest('a[href]');
    if (!a) return null;
    const m = a.getAttribute('href').match(/\/tf-perturbseq\/link\/([^/?#]+)\/([^/?#]+)/);
    if (!m) return null;
    return { el: a, tf: decodeURIComponent(m[1]), gene: decodeURIComponent(m[2]) };
  }

  function positionNear(el) {
    const pad = 8, W = window.innerWidth, H = window.innerHeight;
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = r.left, y = r.bottom + 6;
    if (y + th > H - pad) y = r.top - th - 6;
    if (x + tw > W - pad) x = r.right - tw;
    tip.style.left = Math.max(pad, x) + 'px';
    tip.style.top  = Math.max(pad, y) + 'px';
  }

  function sparkline(expr, color, showAxis) {
    const W=312, PL=30, PR=6, PT=4, PB=showAxis?33:5;
    const IW=W-PL-PR, IH=44, H=PT+IH+PB;
    const vals = expr.map(d => d.mean_tpm||0);
    const vMax = Math.max(...vals, 0.01);
    const n = expr.length;
    const xs = expr.map((_,i) => PL + (i/(n-1))*IW);
    const toY = v => PT + IH - (v/vMax)*IH;
    const pts = xs.map((x,i) => [x, toY(vals[i])]);
    const base = PT + IH;
    // Catmull-Rom → cubic Bézier (same algorithm as expr-chart.js uses via D3)
    function crPath(pts) {
      const f = v => Math.round(v*10)/10;
      let d = `M${f(pts[0][0])},${f(pts[0][1])}`;
      for (let i=0; i<pts.length-1; i++) {
        const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
        const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
        const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
        d += ` C${f(c1x)},${f(c1y)} ${f(c2x)},${f(c2y)} ${f(p2[0])},${f(p2[1])}`;
      }
      return d;
    }
    const linePath = crPath(pts);
    // Area: descend to baseline at each end, enclose the smooth curve
    const areaPath = `M${pts[0][0]},${base} L${linePath.substring(1)} L${pts[n-1][0]},${base} Z`;
    const yticks = [0, vMax/2, vMax].map(v=>{
      const y=toY(v), lbl=v===0?'0':v<10?v.toFixed(1):Math.round(v);
      return `<line x1="${PL-4}" y1="${y}" x2="${PL}" y2="${y}" stroke="#ccc" stroke-width="0.8"/><text x="${PL-6}" y="${y+3}" text-anchor="end" font-size="7" fill="#aaa">${lbl}</text>`;
    }).join('');
    const yLbl=`<text transform="rotate(-90)" x="${-(PT+IH/2)}" y="9" text-anchor="middle" font-size="7" fill="#aaa">TPM</text>`;
    const lbls=['ES','12h','24h','36h','48h','60h','72h'];
    const xAxisLabel=showAxis?`<text x="${PL+IW/2}" y="${H-2}" text-anchor="middle" font-size="8" fill="#aaa" font-style="italic">ESC → DE time point</text>`:'';
    const xAxis=showAxis?xs.map((x,i)=>
      `<line x1="${x}" y1="${PT+IH+2}" x2="${x}" y2="${PT+IH+5}" stroke="#bbb" stroke-width="1"/><text x="${x}" y="${H-14}" text-anchor="middle" font-size="8" fill="#aaa">${lbls[i]}</text>`
    ).join(''):'';
    return `<svg width="${W}" height="${H}" style="display:block;overflow:visible">${yLbl}${yticks}<path d="${areaPath}" fill="${color}" opacity="0.15"/><path d="${linePath}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"/>${xAxis}${xAxisLabel}</svg>`;
  }

  function render(tf, gene, data, el) {
    tipTf.textContent  = tf;
    tipGene.textContent= gene;
    let html='';
    if (data.tf_expr && data.tf_expr.length) {
      html += `<div class="lt-chart-label">${tf} — transcription factor</div>${sparkline(data.tf_expr,'#4a56b0',false)}`;
    }
    if (data.gene_expr && data.gene_expr.length) {
      html += `<div class="lt-chart-label" style="margin-top:8px">${gene} — target gene</div>${sparkline(data.gene_expr,'#059669',true)}`;
    }
    if (!html) html='<span style="color:var(--text-muted,#aaa);font-size:12px">Loading…</span>';
    tipB.innerHTML=html;
    tip.style.display='block';
    positionNear(el);
  }

  function scheduleHide() {
    hideTimer = setTimeout(()=>{ tip.style.display='none'; }, 150);
  }

  function show(el, tf, gene) {
    clearTimeout(hideTimer);
    const key=tf+'\x00'+gene;
    if (cache[key]!==undefined) { render(tf,gene,cache[key],el); return; }
    render(tf,gene,{tf_expr:[],gene_expr:[]},el);
    fetch('/tf-perturbseq/api/link/'+encodeURIComponent(tf)+'/'+encodeURIComponent(gene)+'/tooltip')
      .then(r=>r.json())
      .then(data=>{ cache[key]=data; if(currentEl===el) render(tf,gene,data,el); })
      .catch(()=>{ cache[key]={tf_expr:[],gene_expr:[]}; });
  }

  document.addEventListener('mouseover', e=>{
    if (window._tooltipLocked) return;
    const r=resolveTarget(e.target);
    if(!r) return;
    currentEl=r.el;
    show(r.el,r.tf,r.gene);
  });
  document.addEventListener('mouseout', e=>{
    const r=resolveTarget(e.target);
    if(r){ currentEl=null; scheduleHide(); }
  });

  // Public API — lets other tooltips (e.g. scatter plot) reuse the same sparklines + cache
  window._renderLinkCharts = function(tf, gene, el, cb) {
    const key = tf+'\x00'+gene;
    function doRender(data) {
      let html='';
      if (data.tf_expr && data.tf_expr.length)
        html += `<div class="lt-chart-label">${tf} — TF</div>${sparkline(data.tf_expr,'#4a56b0',false)}`;
      if (data.gene_expr && data.gene_expr.length)
        html += `<div class="lt-chart-label" style="margin-top:8px">${gene} — target gene</div>${sparkline(data.gene_expr,'#059669',true)}`;
      if (html)
        html = `<div style="font-size:10px;font-weight:700;color:var(--text-muted,#888);text-align:center;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Expression during DE differentiation</div>` + html;
      el.innerHTML = html;
      if (cb) cb();
    }
    if (cache[key]!==undefined) { doRender(cache[key]); return; }
    el.innerHTML = '<span style="font-size:11px;color:var(--text-muted,#aaa)">Loading…</span>';
    if (cb) cb();
    fetch('/tf-perturbseq/api/link/'+encodeURIComponent(tf)+'/'+encodeURIComponent(gene)+'/tooltip')
      .then(r=>r.json())
      .then(data=>{ cache[key]=data; doRender(data); })
      .catch(()=>{ cache[key]={tf_expr:[],gene_expr:[]}; doRender(cache[key]); });
  };
})();
</script>
