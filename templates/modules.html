<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gene Modules — ESC→Endoderm Browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f4f7ff;
    color: #1e2448;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #bg-canvas { position: fixed; inset: 0; z-index: 0; }

  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 60%, rgba(180,200,255,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 30%, rgba(200,180,255,0.30) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 55% 85%, rgba(160,230,255,0.25) 0%, transparent 70%);
  }

  .page {
    position: relative;
    z-index: 1;
    padding: 64px 40px 72px;
    max-width: 760px;
    width: 100%;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: #8090b0;
    text-decoration: none;
    margin-bottom: 40px;
    transition: color 0.15s;
  }
  .back-link:hover { color: #2c5fe8; }

  h1 {
    font-size: clamp(1.9rem, 4.5vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #2c5fe8 0%, #7c3fc0 45%, #0892c8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.6s ease both;
  }

  .subtitle {
    font-size: 14.5px;
    color: #5a6580;
    margin-bottom: 36px;
    animation: fadeUp 0.6s 0.08s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    animation: fadeUp 0.6s 0.16s ease both;
  }

  a.card {
    display: flex;
    flex-direction: column;
    background: #ffffff;
    border: 1px solid #dce1f0;
    border-radius: 20px;
    padding: 36px 32px 32px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  a.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 32px rgba(44,95,232,0.11);
    border-color: rgba(107,143,255,0.38);
  }

  .card-icon { margin-bottom: 24px; }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #1e2448;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .card-desc {
    font-size: 13.5px;
    line-height: 1.65;
    color: #6a7898;
  }

  @media (max-width: 500px) {
    .cards { grid-template-columns: 1fr; }
    .page { padding: 48px 24px 56px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="bg-glow"></div>

<div class="page">

  <a class="back-link" href="/">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Home
  </a>

  <h1>Gene Modules</h1>
  <p class="subtitle">Select a module collection to explore</p>

  <div class="cards">

    <!-- Card 1: Normal development -->
    <a class="card" href="/network">
      <div class="card-icon">
        <svg width="64" height="52" viewBox="0 0 64 52" fill="none">
          <line x1="22" y1="15" x2="42" y2="11" stroke="#4a7aee" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
          <line x1="22" y1="15" x2="11" y2="32" stroke="#18a8d8" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
          <line x1="22" y1="15" x2="36" y2="38" stroke="#4a7aee" stroke-width="1.0" stroke-linecap="round" opacity="0.45"/>
          <line x1="42" y1="11" x2="54" y2="27" stroke="#f59e42" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
          <line x1="42" y1="11" x2="36" y2="38" stroke="#4a7aee" stroke-width="1.0" stroke-linecap="round" opacity="0.45"/>
          <line x1="11" y1="32" x2="36" y2="38" stroke="#18a8d8" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
          <line x1="54" y1="27" x2="36" y2="38" stroke="#8a5fd8" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
          <line x1="11" y1="32" x2="42" y2="11" stroke="#8a5fd8" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
          <circle cx="22" cy="15" r="5.5" fill="#4a7aee"/>
          <circle cx="42" cy="11" r="5"   fill="#f59e42"/>
          <circle cx="54" cy="27" r="4.5" fill="#18a8d8"/>
          <circle cx="36" cy="38" r="5"   fill="#8a5fd8"/>
          <circle cx="11" cy="32" r="4"   fill="#22c55e"/>
        </svg>
      </div>
      <div class="card-title">Normal Development</div>
      <div class="card-desc">Co-expression modules derived from single-cell ESC→DE transcriptomics, capturing coordinated gene programs.</div>
    </a>

    <!-- Card 2: TF perturbation -->
    <a class="card" href="/perturbseq/">
      <div class="card-icon">
        <svg width="64" height="52" viewBox="0 0 64 52" fill="none">
          <line x1="18" y1="26" x2="42" y2="10" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <line x1="18" y1="26" x2="44" y2="26" stroke="#4a7aee" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <line x1="18" y1="26" x2="42" y2="42" stroke="#18a8d8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
          <rect x="8"  y="17" width="19" height="19" rx="4" fill="#4a56b0"/>
          <rect x="36" y="4"  width="18" height="13" rx="3" fill="#F28E2B"/>
          <rect x="37" y="20" width="18" height="13" rx="3" fill="#4E79A7"/>
          <rect x="36" y="36" width="18" height="13" rx="3" fill="#59A14F"/>
        </svg>
      </div>
      <div class="card-title">TF Perturbation</div>
      <div class="card-desc">Gene modules linked to TF activity via CRISPR Perturb-seq screens and ChIP-seq binding data.</div>
    </a>

  </div>

</div>

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function mkPts(n) {
    return Array.from({ length: n }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.28, vy: (Math.random() - 0.5) * 0.28,
      r: Math.random() * 1.6 + 0.8,
    }));
  }
  function frame() {
    ctx.clearRect(0, 0, W, H);
    const LINK = 130;
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i];
      for (let j = i + 1; j < pts.length; j++) {
        const b = pts[j];
        const dx = a.x - b.x, dy = a.y - b.y, d2 = dx*dx + dy*dy;
        if (d2 < LINK * LINK) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(80,110,220,${0.38 * (1 - Math.sqrt(d2) / LINK) * 0.55})`;
          ctx.lineWidth = 0.55;
          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(80,110,220,0.25)'; ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    });
    requestAnimationFrame(frame);
  }
  resize(); pts = mkPts(65);
  window.addEventListener('resize', () => { resize(); pts = mkPts(65); });
  frame();
})();
</script>

</body>
</html>
