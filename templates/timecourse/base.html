<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Time-Course Networks{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/perturbseq.css') }}">
    <script src="{{ url_for('static', filename='cytoscape.min.js') }}"></script>
    {% block extra_style %}{% endblock %}
</head>
<body>
<nav>
    <a href="/">← Home</a>
    <a class="brand" href="/timecourse/">Time-Course Networks</a>
    <a href="/timecourse/">Overlay</a>
    <a href="/timecourse/toggle">Toggle</a>
    <a href="/timecourse/dual">Dual-Pane</a>
    <a href="/timecourse/sankey">Sankey</a>
    <a href="/timecourse/clusters">Clusters</a>
    <span class="nav-search">
        <input type="text" id="nav-gc-search" list="nav-gc-list" placeholder="Gene cluster…">
        <datalist id="nav-gc-list">
            {% for c in gene_clusters %}<option value="{{ c }}">{% endfor %}
        </datalist>
    </span>
    <span class="nav-search">
        <input type="text" id="nav-pc-search" list="nav-pc-list" placeholder="Peak cluster…">
        <datalist id="nav-pc-list">
            {% for c in peak_clusters %}<option value="{{ c }}">{% endfor %}
        </datalist>
    </span>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script>
document.getElementById('nav-gc-search').addEventListener('change', e => {
    const v = e.target.value;
    if (v) window.location.href = '/timecourse/gene-cluster/' + encodeURIComponent(v);
});
document.getElementById('nav-pc-search').addEventListener('change', e => {
    const v = e.target.value;
    if (v) window.location.href = '/timecourse/peak-cluster/' + encodeURIComponent(v);
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
